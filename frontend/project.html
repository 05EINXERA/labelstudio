<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project - Dataset Workspace</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css?v=3">
</head>

<body style="background: var(--bg);">

  <header class="mgmt-header">
    <div class="brand">
      <a href="projects.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;">
        <img src="logo.png" alt="Logo">
      </a>
      <div>
        <p class="mgmt-eyebrow" style="margin: 0;">
          <a href="projects.html" style="color: var(--muted); text-decoration: none;">Projects</a> /
        </p>
        <h1 id="projectName">Loading…</h1>
      </div>
      <span class="pill" id="projectStatus" style="margin-left: 8px;"></span>
    </div>
    <div class="spacer"></div>
    <span class="mgmt-user" id="currentUser"></span>
    <button class="primary" id="annotateBtn" type="button"
      style="padding: 9px 16px; border-radius: 8px; font-weight: 600;">Annotate</button>
    <button class="tool-button" id="logoutBtn" type="button">Log out</button>
  </header>

  <div class="project-shell">
    <nav class="project-nav" id="projectNav" aria-label="Project sections">
      <p class="nav-section">Project</p>
      <!-- Links injected by project-nav.js -->
    </nav>

    <main class="project-view" id="projectView" aria-live="polite">
      <div class="mgmt-empty">Loading…</div>
    </main>
  </div>

  <script type="module" src="js/pages/project/router.js?v=1"></script>
</body>

</html>
