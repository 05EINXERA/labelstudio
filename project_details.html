<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details - Dataset Workspace</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css?v=2">
  <style>
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .task-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border-radius: 8px;
      border: 1px solid var(--line);
      display: block;
      overflow-x: auto;
      white-space: nowrap;
    }
    .task-table th, .task-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .task-table th {
      background: var(--panel-2);
      font-weight: 600;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .status-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--panel-2);
      color: var(--ink);
    }
    .status-badge.completed { background: #dcfce7; color: #166534; }
    .status-badge.new { background: #dbeafe; color: #1e40af; }

    @media (max-width: 640px) {
      .project-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .project-header h1 {
        font-size: 1.4rem !important;
      }
      .task-table th, .task-table td {
        padding: 8px 10px;
        font-size: 0.82rem;
      }
    }

    @media (max-width: 400px) {
      .project-header h1 {
        font-size: 1.2rem !important;
      }
    }
  </style>
</head>
<body style="background: var(--bg);">

  <!-- Brand Header -->
  <header style="background: var(--panel); border-bottom: 1px solid var(--line); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
    <div style="display: flex; align-items: center; gap: 15px;">
      <img src="logo.png" alt="Logo" style="height: 32px;">
      <h1 style="font-size: 1.2rem; font-weight: 700; margin: 0; color: var(--ink);">Project Details</h1>
    </div>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
      <a href="dashboard.html" style="text-decoration: none;">
        <button class="secondary" style="padding: 8px 16px; border-radius: 6px;">View Dashboard</button>
      </a>
      <a href="app.html" style="text-decoration: none;">
        <button class="secondary" style="padding: 8px 16px; border-radius: 6px;">Back to Workspace</button>
      </a>
    </div>
  </header>

  <main style="max-width: 1000px; margin: 24px auto; padding: 0 16px;">
    
    <div class="project-header">
      <div>
        <p class="eyebrow">Project Management</p>
        <h1 id="projectName" style="font-size: 2rem; font-weight: 800; margin: 0;">Loading Project...</h1>
      </div>
      <div>
        <button class="primary" id="startAnnotatingBtn" style="padding: 10px 20px; border-radius: 6px; font-weight: 600; font-size: 1rem;">
          ✏️ Start Annotating
        </button>
      </div>
    </div>

    <div class="action-bar">
      <div>
        <label for="imageUploadInput" class="primary" style="padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; display: inline-block; background: var(--panel-2); color: var(--ink); border: 1px solid var(--line);">
          ➕ Upload Images
        </label>
        <input type="file" id="imageUploadInput" accept="image/*" multiple style="display: none;">
      </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap;">
      <div style="display: flex; gap: 12px; align-items: center; flex: 1; min-width: 300px;">
        <input type="text" id="searchFilter" placeholder="Search filename..." style="padding: 8px; border-radius: 6px; border: 1px solid var(--line); background: rgba(0,0,0,0.1); color: var(--ink); width: 250px;">
        <select id="statusFilter" style="padding: 8px; border-radius: 6px; border: 1px solid var(--line); background: rgba(0,0,0,0.1); color: var(--ink);">
          <option value="All">All Statuses</option>
          <option value="New">New</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div id="bulkActions" style="display: none; gap: 8px; align-items: center;">
        <span style="font-size: 0.9rem; color: var(--muted); margin-right: 8px;" id="selectedCount">0 selected</span>
        <button class="tool-button" id="bulkDeleteBtn" style="color: #ff6b6b; border-color: rgba(255,107,107,0.3);">Bulk Delete</button>
        <button class="tool-button" id="bulkAssignBtn">Bulk Assign</button>
      </div>
    </div>

    <table class="task-table" id="taskTable">
      <thead>
        <tr>
          <th style="width: 40px; text-align: center;"><input type="checkbox" id="selectAllCheckbox"></th>
          <th data-sort="id" style="cursor: pointer; user-select: none;">ID ↕</th>
          <th>Preview</th>
          <th data-sort="description" style="cursor: pointer; user-select: none;">Filename ↕</th>
          <th data-sort="assignee" style="cursor: pointer; user-select: none;">Assignee ↕</th>
          <th data-sort="time_spent" style="cursor: pointer; user-select: none;">Time Spent ↕</th>
          <th data-sort="status" style="cursor: pointer; user-select: none;">Status ↕</th>
          <th data-sort="updated_at" style="cursor: pointer; user-select: none;">Updated ↕</th>
          <th style="text-align: center;">Actions</th>
        </tr>
      </thead>
      <tbody id="taskTableBody">
        <tr>
          <td colspan="9" style="text-align: center; color: var(--muted);">Loading tasks...</td>
        </tr>
      </tbody>
    </table>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
      <span id="pageInfo" style="font-size: 0.9rem; color: var(--muted);"></span>
      <div style="display: flex; gap: 8px;">
        <button class="tool-button" id="prevPageBtn" disabled>Previous</button>
        <button class="tool-button" id="nextPageBtn" disabled>Next</button>
      </div>
    </div>

  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');

    // --- State ---
    let allTasks = [];
    let sortCol = 'id';
    let sortDesc = false;
    let currentPage = 1;
    let rowsPerPage = 10;
    let searchQuery = '';
    let statusFilter = 'All';
    let selectedTaskIds = new Set();

    if (!projectId) {
      document.getElementById('projectName').textContent = "Project Not Found";
    } else {
      loadProjectDetails();
      loadProjectTasks();
    }

    document.getElementById('startAnnotatingBtn').addEventListener('click', () => {
      window.location.href = `app.html?projectId=${projectId}`;
    });

    document.getElementById('imageUploadInput').addEventListener('change', async (e) => {
      const files = e.target.files;
      if (files.length === 0) return;

      const formData = new FormData();
      for (let i = 0; i < files.length; i++) {
        formData.append('file', files[i]);
      }

      try {
        const assignee = encodeURIComponent(localStorage.getItem('dataset_username') || 'Unknown');
        const res = await fetch(`/api/projects/${projectId}/upload?assignee=${assignee}`, {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          e.target.value = '';
          loadProjectTasks();
        } else {
          alert('Upload failed');
        }
      } catch (err) {
        console.error(err);
        alert('Upload failed');
      }
    });

    async function loadProjectDetails() {
      try {
        const res = await fetch('/api/projects');
        if (res.ok) {
          const projects = await res.json();
          const project = projects.find(p => p.id == projectId);
          if (project) {
            document.getElementById('projectName').textContent = project.name;
          } else {
            document.getElementById('projectName').textContent = "Project Not Found";
          }
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function loadProjectTasks() {
      try {
        const res = await fetch(`/api/tasks?projectId=${projectId}`);
        if (res.ok) {
          allTasks = await res.json();
          renderTable();
        }
      } catch (e) {
        console.error(e);
      }
    }

    function renderTable() {
      const tbody = document.getElementById('taskTableBody');
      tbody.innerHTML = '';

      // 1. Filter
      let filtered = allTasks.filter(t => {
        const matchesSearch = t.description && t.description.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesStatus = statusFilter === 'All' || t.status === statusFilter;
        return matchesSearch && matchesStatus;
      });

      // 2. Sort
      filtered.sort((a, b) => {
        let valA = a[sortCol];
        let valB = b[sortCol];
        
        // Handle nulls and different types safely
        if (valA == null) valA = '';
        if (valB == null) valB = '';
        if (typeof valA === 'string') valA = valA.toLowerCase();
        if (typeof valB === 'string') valB = valB.toLowerCase();

        if (valA < valB) return sortDesc ? 1 : -1;
        if (valA > valB) return sortDesc ? -1 : 1;
        return 0;
      });

      // 3. Paginate
      const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      const startIndex = (currentPage - 1) * rowsPerPage;
      const pageData = filtered.slice(startIndex, startIndex + rowsPerPage);

      // Update Pagination UI
      document.getElementById('pageInfo').textContent = `Showing ${pageData.length > 0 ? startIndex + 1 : 0} to ${Math.min(startIndex + rowsPerPage, filtered.length)} of ${filtered.length} entries`;
      document.getElementById('prevPageBtn').disabled = currentPage === 1;
      document.getElementById('nextPageBtn').disabled = currentPage === totalPages;

      // Update Select All Checkbox state
      const selectAllCb = document.getElementById('selectAllCheckbox');
      selectAllCb.checked = pageData.length > 0 && pageData.every(t => selectedTaskIds.has(t.id));

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; color: var(--muted);">No tasks match your filters.</td></tr>';
        updateBulkUI();
        return;
      }

      // 4. Render Rows
      pageData.forEach(task => {
        const tr = document.createElement('tr');
        const badgeClass = task.status.toLowerCase() === 'completed' ? 'completed' : 'new';
        const imgUrl = '/' + task.image_path.replace(/\\\\/g, '/');
        
        // Time Formatting
        const secs = task.time_spent || 0;
        const h = Math.floor(secs / 3600).toString().padStart(2, '0');
        const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
        const s = (secs % 60).toString().padStart(2, '0');
        const formattedTime = secs > 0 ? `${h}:${m}:${s}` : '-';

        // Date Formatting
        let formattedDate = '-';
        if (task.updated_at) {
          const d = new Date(task.updated_at + 'Z'); // UTC
          if (!isNaN(d.getTime())) {
            formattedDate = d.toLocaleString();
          } else {
            formattedDate = task.updated_at;
          }
        }

        const isChecked = selectedTaskIds.has(task.id) ? 'checked' : '';

        tr.innerHTML = `
          <td style="text-align: center;"><input type="checkbox" class="row-checkbox" data-id="${task.id}" ${isChecked}></td>
          <td>${task.id}</td>
          <td><img src="${imgUrl}" style="height: 40px; border-radius: 4px; border: 1px solid var(--line);"></td>
          <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${task.description}</td>
          <td>${task.assignee || '<span style="color:var(--muted)">Unassigned</span>'}</td>
          <td style="font-family: monospace; font-size: 0.95rem;">${formattedTime}</td>
          <td><span class="status-badge ${badgeClass}">${task.status}</span></td>
          <td style="font-size: 0.85rem; color: var(--muted);">${formattedDate}</td>
          <td style="text-align: center; white-space: nowrap;">
            <button type="button" class="icon-button edit-task-btn" 
              data-id="${task.id}" 
              data-description="${task.description}" 
              data-assignee="${task.assignee || ''}" 
              data-status="${task.status}" 
              style="padding: 6px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center;" title="Edit Task">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
            </button>
            <button type="button" class="icon-button delete-task-btn" 
              data-id="${task.id}" 
              style="padding: 6px; border-radius: 4px; color: #ff6b6b; display: inline-flex; align-items: center; justify-content: center;" title="Delete Task">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Attach row listeners
      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const id = parseInt(e.target.dataset.id, 10);
          if (e.target.checked) selectedTaskIds.add(id);
          else selectedTaskIds.delete(id);
          updateBulkUI();
          
          // Update select all checkbox logic based on new selection
          const currentVisibleIds = pageData.map(t => t.id);
          selectAllCb.checked = currentVisibleIds.every(id => selectedTaskIds.has(id));
        });
      });

      document.querySelectorAll('.edit-task-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const b = e.currentTarget;
          openEditTaskModal(b.dataset.id, b.dataset.description, b.dataset.assignee, b.dataset.status);
        });
      });

      document.querySelectorAll('.delete-task-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const taskId = e.currentTarget.dataset.id;
          if (confirm('Are you sure you want to delete this task? This action cannot be undone.')) {
            try {
              const res = await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
              if (res.ok) {
                selectedTaskIds.delete(parseInt(taskId, 10));
                loadProjectTasks();
              } else {
                alert('Failed to delete task.');
              }
            } catch (err) {
              console.error(err);
              alert('Failed to delete task.');
            }
          }
        });
      });

      updateBulkUI();
    }

    // --- Toolbar & Table Event Listeners ---
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchFilter').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        currentPage = 1;
        renderTable();
      });

      document.getElementById('statusFilter').addEventListener('change', (e) => {
        statusFilter = e.target.value;
        currentPage = 1;
        renderTable();
      });

      document.getElementById('prevPageBtn').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          renderTable();
        }
      });

      document.getElementById('nextPageBtn').addEventListener('click', () => {
        currentPage++;
        renderTable();
      });

      // Sorting
      document.querySelectorAll('th[data-sort]').forEach(th => {
        th.addEventListener('click', (e) => {
          const col = e.currentTarget.dataset.sort;
          if (sortCol === col) {
            sortDesc = !sortDesc;
          } else {
            sortCol = col;
            sortDesc = false;
          }
          
          // Update header arrows
          document.querySelectorAll('th[data-sort]').forEach(el => {
            el.innerHTML = el.innerHTML.replace(/ [↑↓↕]/, ' ↕');
          });
          e.currentTarget.innerHTML = e.currentTarget.innerHTML.replace(' ↕', sortDesc ? ' ↓' : ' ↑');
          
          renderTable();
        });
      });

      // Select All
      document.getElementById('selectAllCheckbox').addEventListener('change', (e) => {
        const isChecked = e.target.checked;
        const visibleCheckboxes = document.querySelectorAll('.row-checkbox');
        visibleCheckboxes.forEach(cb => {
          cb.checked = isChecked;
          const id = parseInt(cb.dataset.id, 10);
          if (isChecked) selectedTaskIds.add(id);
          else selectedTaskIds.delete(id);
        });
        updateBulkUI();
      });
    });

    // --- Bulk Action Logic ---
    function updateBulkUI() {
      const container = document.getElementById('bulkActions');
      const countLabel = document.getElementById('selectedCount');
      if (selectedTaskIds.size > 0) {
        container.style.display = 'flex';
        countLabel.textContent = `${selectedTaskIds.size} selected`;
      } else {
        container.style.display = 'none';
      }
    }

    document.getElementById('bulkDeleteBtn').addEventListener('click', async () => {
      if (selectedTaskIds.size === 0) return;
      if (confirm(`Are you sure you want to permanently delete ${selectedTaskIds.size} tasks?`)) {
        try {
          const res = await fetch('/api/tasks/bulk-delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ids: Array.from(selectedTaskIds) })
          });
          if (res.ok) {
            selectedTaskIds.clear();
            loadProjectTasks();
          } else {
            alert('Failed to bulk delete tasks.');
          }
        } catch(e) {
          console.error(e);
          alert('Failed to bulk delete tasks.');
        }
      }
    });

    document.getElementById('bulkAssignBtn').addEventListener('click', async () => {
      if (selectedTaskIds.size === 0) return;
      const newAssignee = prompt("Enter the new assignee's username for the selected tasks:");
      if (newAssignee === null) return; // cancelled
      
      try {
        const res = await fetch('/api/tasks/bulk-update', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ ids: Array.from(selectedTaskIds), assignee: newAssignee.trim() })
        });
        if (res.ok) {
          selectedTaskIds.clear();
          loadProjectTasks();
        } else {
          alert('Failed to bulk assign tasks.');
        }
      } catch(e) {
        console.error(e);
        alert('Failed to bulk assign tasks.');
      }
    });

    // --- Edit Task Modal Logic ---
    function openEditTaskModal(id, description, assignee, status) {
      document.getElementById('editTaskId').value = id;
      document.getElementById('editTaskDescription').value = description;
      document.getElementById('editTaskAssignee').value = assignee;
      document.getElementById('editTaskStatus').value = status;
      document.getElementById('editTaskModal').classList.add('is-active');
    }

    function closeEditTaskModal() {
      document.getElementById('editTaskModal').classList.remove('is-active');
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('editTaskClose').addEventListener('click', closeEditTaskModal);
      document.getElementById('editTaskCancelBtn').addEventListener('click', closeEditTaskModal);

      document.getElementById('editTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editTaskId').value;
        const description = document.getElementById('editTaskDescription').value;
        const assignee = document.getElementById('editTaskAssignee').value;
        const status = document.getElementById('editTaskStatus').value;

        try {
          const res = await fetch('/api/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, description, assignee, status })
          });
          if (res.ok) {
            closeEditTaskModal();
            loadProjectTasks();
          } else {
            alert('Failed to update task.');
          }
        } catch (err) {
          console.error(err);
          alert('Failed to update task.');
        }
      });
    });

  </script>

  <!-- Edit Task Modal -->
  <div class="modal-overlay" id="editTaskModal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="modal-title">Edit Task</h2>
        <button class="modal-close" id="editTaskClose">×</button>
      </div>
      <form id="editTaskForm">
        <input type="hidden" id="editTaskId">
        <div style="margin-bottom: 12px;">
          <label style="display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: var(--muted);">Filename (Description)</label>
          <input type="text" id="editTaskDescription" required style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--line); background: rgba(0,0,0,0.1); color: var(--ink);">
        </div>
        <div style="margin-bottom: 12px;">
          <label style="display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: var(--muted);">Assignee</label>
          <input type="text" id="editTaskAssignee" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--line); background: rgba(0,0,0,0.1); color: var(--ink);">
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: var(--muted);">Status</label>
          <select id="editTaskStatus" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--line); background: rgba(0,0,0,0.1); color: var(--ink);">
            <option value="New">New</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="tool-button" id="editTaskCancelBtn">Cancel</button>
          <button type="submit" class="primary" style="padding: 8px 16px; border-radius: 6px;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
